name: Release

# Tag a version (e.g. `git tag v1.0.0 && git push --tags`) to build installers
# for Android, Linux and Windows and attach them to a GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename APK
        run: |
          V="${GITHUB_REF_NAME#v}"
          cp build/app/outputs/flutter-apk/app-release.apk "chess-${V}-android.apk"
      - uses: actions/upload-artifact@v4
        with: { name: android, path: 'chess-*-android.apk' }

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', channel: stable, cache: true }
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config liblzma-dev file
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package (tar.gz, AppImage, deb)
        run: |
          set -e
          export VERSION="${GITHUB_REF_NAME#v}"
          tar -C build/linux/x64/release/bundle -czf "chess-${VERSION}-linux-x86_64.tar.gz" .
          bash installers/linux/build_appimage.sh
          bash installers/linux/build_deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            chess-*-linux-x86_64.tar.gz
            *.AppImage
            *.deb

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Build installer (Inno Setup) + portable zip
        shell: pwsh
        run: |
          $V = "${env:GITHUB_REF_NAME}".TrimStart("v")
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$V" installers\windows\chess.iss
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "chess-$V-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            installers/windows/Output/*.exe
            chess-*-windows-x64.zip

  release:
    needs: [android, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
